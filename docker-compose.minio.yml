# MinIO-backed storage. When combining with `docker-compose.llm.yml`, list this file **last**
# so `STORAGE_TYPE=minio` wins over the LLM overlay defaults for both `worker` and `worker-llm`.

services:
  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      STORAGE_TYPE: minio
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/data}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-docrunr}
      MINIO_SECURE: "false"

  worker-llm:
    depends_on:
      rabbitmq:
        condition: service_healthy
      litellm:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      STORAGE_TYPE: minio
      STORAGE_BASE_PATH: ${STORAGE_BASE_PATH:-/data}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-docrunr}
      MINIO_SECURE: "false"

volumes:
  minio-data:
    name: docrunr-minio-data
