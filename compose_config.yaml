name: docrunr
services:
  litellm:
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    depends_on:
      ollama:
        condition: service_healthy
        required: true
    environment:
      OLLAMA_API_BASE: http://ollama:11434
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 15s
    image: ghcr.io/berriai/litellm:main-latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 4000
        published: "4000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/rick/github/docrunr/litellm.yaml
        target: /app/config.yaml
        read_only: true
        bind: {}
  ollama:
    entrypoint:
      - /bin/sh
      - /docrunr-ollama-entrypoint.sh
    environment:
      OLLAMA_EMBED_MODELS: nomic-embed-text,embeddinggemma,bge-m3,qwen3-embedding:8b
    healthcheck:
      test:
        - CMD-SHELL
        - ollama list >/dev/null 2>&1 || exit 1
      timeout: 5s
      interval: 10s
      retries: 6
      start_period: 5m0s
    image: ollama/ollama:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 11434
        published: "11434"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/rick/github/docrunr/.data/ollama
        target: /root/.ollama
        bind: {}
      - type: bind
        source: /Users/rick/github/docrunr/scripts/ollama-docker-entrypoint.sh
        target: /docrunr-ollama-entrypoint.sh
        read_only: true
        bind: {}
  rabbitmq:
    environment:
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_USER: guest
    healthcheck:
      test:
        - CMD
        - rabbitmq-diagnostics
        - check_port_connectivity
      timeout: 5s
      interval: 10s
      retries: 5
      start_period: 15s
    image: rabbitmq:4.0-management-alpine
    networks:
      default: null
    ports:
      - mode: ingress
        target: 5672
        published: "5672"
        protocol: tcp
      - mode: ingress
        target: 15672
        published: "15672"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: volume
        source: rabbitmq-data
        target: /var/lib/rabbitmq
        volume: {}
  worker:
    build:
      context: /Users/rick/github/docrunr
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
        required: true
    environment:
      HEALTH_PORT: "8080"
      JOB_TIMEOUT_SECONDS: "120"
      MINIO_ACCESS_KEY: docrunr
      MINIO_BUCKET: docrunr
      MINIO_ENDPOINT: minio:9000
      MINIO_SECRET_KEY: docrunr-secret
      MINIO_SECURE: "false"
      RABBITMQ_DLQ_QUEUE: docrunr.dlq
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_LLM_QUEUE: docrunr.llm.jobs
      RABBITMQ_PASSWORD: guest
      RABBITMQ_PORT: "5672"
      RABBITMQ_QUEUE: docrunr.jobs
      RABBITMQ_RESULT_QUEUE: docrunr.results
      RABBITMQ_USER: guest
      SQLITE_BASE_PATH: /db
      STORAGE_BASE_PATH: /data
      STORAGE_TYPE: local
      UI_PASSWORD: ""
      WORKER_CONCURRENCY: "1"
    image: docrunr:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "8080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/rick/github/docrunr/.data
        target: /data
        bind: {}
      - type: volume
        source: worker-db
        target: /db
        volume: {}
  worker-llm:
    build:
      context: /Users/rick/github/docrunr
      dockerfile: Dockerfile.llm
    depends_on:
      litellm:
        condition: service_healthy
        required: true
      rabbitmq:
        condition: service_healthy
        required: true
    environment:
      HEALTH_PORT: "8080"
      JOB_TIMEOUT_SECONDS: "120"
      LITELLM_API_KEY: ""
      LITELLM_BASE_URL: http://litellm:4000
      LITELLM_TIMEOUT_SECONDS: "600"
      MINIO_ACCESS_KEY: docrunr
      MINIO_BUCKET: docrunr
      MINIO_ENDPOINT: minio:9000
      MINIO_SECRET_KEY: docrunr-secret
      MINIO_SECURE: "false"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_LLM_DLQ_QUEUE: docrunr.llm.dlq
      RABBITMQ_LLM_QUEUE: docrunr.llm.jobs
      RABBITMQ_LLM_RESULT_QUEUE: docrunr.llm.results
      RABBITMQ_PASSWORD: guest
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      SQLITE_BASE_PATH: /db
      STORAGE_BASE_PATH: /data
      STORAGE_TYPE: local
      UI_PASSWORD: ""
      WORKER_CONCURRENCY: "1"
    image: docrunr-llm:latest
    networks:
      default: null
    ports:
      - mode: ingress
        target: 8080
        published: "8081"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /Users/rick/github/docrunr/.data
        target: /data
        bind: {}
      - type: volume
        source: worker-llm-db
        target: /db
        volume: {}
networks:
  default:
    name: docrunr_default
volumes:
  rabbitmq-data:
    name: docrunr-rabbitmq-data
  worker-db:
    name: docrunr-worker-db
  worker-llm-db:
    name: docrunr-worker-llm-db
