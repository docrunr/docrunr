name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: UV_CACHE_DIR=.uv-cache uv run ruff check .

      - name: Type check core
        run: UV_CACHE_DIR=.uv-cache uv run mypy core/src/docrunr

      - name: Type check worker
        run: UV_CACHE_DIR=.uv-cache uv run mypy worker/src/docrunr_worker

      - name: Tests
        run: UV_CACHE_DIR=.uv-cache uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: UI install
        run: pnpm -C ui install --frozen-lockfile

      - name: UI lint
        run: pnpm -C ui run lint

      - name: UI typecheck
        run: pnpm -C ui run typecheck

  publish-pypi:
    if: false
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build core
          python -m twine check core/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: core/dist/

  publish-docker:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_kind: worker
            dockerfile: Dockerfile
            image_repo_suffix: docrunr
            platform: linux/amd64
            platform_suffix: amd64
            needs_qemu: false
          - image_kind: worker
            dockerfile: Dockerfile
            image_repo_suffix: docrunr
            platform: linux/arm64
            platform_suffix: arm64
            needs_qemu: true
          - image_kind: llm
            dockerfile: Dockerfile.llm
            image_repo_suffix: docrunr-llm
            platform: linux/amd64
            platform_suffix: amd64
            needs_qemu: false
          - image_kind: llm
            dockerfile: Dockerfile.llm
            image_repo_suffix: docrunr-llm
            platform: linux/arm64
            platform_suffix: arm64
            needs_qemu: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker system prune -af || true
          df -h

      - name: Set up QEMU
        if: ${{ matrix.needs_qemu }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive tags
        id: tags
        run: |
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          VERSION="${REF_NAME#v}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_repo_suffix }}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image by digest
        uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          provenance: false
          build-args: |
            DOCRUNR_VERSION=${{ steps.tags.outputs.version }}
          outputs: type=image,name=${{ steps.tags.outputs.image_repo }},push-by-digest=true,name-canonical=true,push=true

      - name: Export image digest
        run: |
          digest="${{ steps.build.outputs.digest }}"
          test -n "${digest}"
          mkdir -p /tmp/digests
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image_kind }}-${{ matrix.platform_suffix }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker-manifest:
    runs-on: ubuntu-latest
    needs: publish-docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_kind: worker
            image_repo_suffix: docrunr
          - image_kind: llm
            image_repo_suffix: docrunr-llm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Derive tags
        id: tags
        run: |
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          VERSION="${REF_NAME#v}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/${{ matrix.image_repo_suffix }}"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download digest artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.image_kind }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE_REPO="${{ steps.tags.outputs.image_repo }}"
          VERSION="${{ steps.tags.outputs.version }}"
          shopt -s nullglob
          sources=()
          for digest in /tmp/digests/*; do
            digest_name="$(basename "${digest}")"
            sources+=("${IMAGE_REPO}@sha256:${digest_name}")
          done
          if [ "${#sources[@]}" -eq 0 ]; then
            echo "No image digests were downloaded" >&2
            exit 1
          fi
          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            -t "${IMAGE_REPO}:latest" \
            "${sources[@]}"
