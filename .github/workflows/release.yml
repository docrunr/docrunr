name: release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: UV_CACHE_DIR=.uv-cache uv run ruff check .

      - name: Type check core
        run: UV_CACHE_DIR=.uv-cache uv run mypy core/src/docrunr

      - name: Type check worker
        run: UV_CACHE_DIR=.uv-cache uv run mypy worker/src/docrunr_worker

      - name: Tests
        run: UV_CACHE_DIR=.uv-cache uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: UI install
        run: pnpm -C ui install --frozen-lockfile

      - name: UI lint
        run: pnpm -C ui run lint

      - name: UI typecheck
        run: pnpm -C ui run typecheck

  publish-pypi:
    if: false # Change to true to re-enable PyPI publishing.
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: read
    env:
      TWINE_USERNAME: __token__
      TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      PYPI_REPOSITORY_URL: ${{ vars.PYPI_REPOSITORY_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build twine
          python -m build core
          python -m twine check core/dist/*

      - name: Publish to PyPI
        run: |
          if [ -n "${PYPI_REPOSITORY_URL}" ]; then
            python -m twine upload --repository-url "${PYPI_REPOSITORY_URL}" core/dist/*
          else
            python -m twine upload core/dist/*
          fi

  publish-docker:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_suffix: amd64
            needs_qemu: false
          - platform: linux/arm64
            platform_suffix: arm64
            needs_qemu: true
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker system prune -af || true
          df -h

      - name: Set up QEMU
        if: ${{ matrix.needs_qemu }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive tags
        id: tags
        run: |
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          VERSION="${REF_NAME#v}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/docrunr"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          # If using a PAT, set GHCR_USERNAME to the PAT owner's login.
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          # Prefer a classic PAT with write:packages for GHCR pushes; fall back to GITHUB_TOKEN.
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          build-args: |
            DOCRUNR_VERSION=${{ steps.tags.outputs.version }}
          tags: |
            ${{ steps.tags.outputs.image_repo }}:${{ steps.tags.outputs.version }}-${{ matrix.platform_suffix }}
            ${{ steps.tags.outputs.image_repo }}:latest-${{ matrix.platform_suffix }}

  publish-docker-manifest:
    runs-on: ubuntu-latest
    needs: publish-docker
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive tags
        id: tags
        run: |
          REF_NAME="${GITHUB_REF_NAME:-manual}"
          VERSION="${REF_NAME#v}"
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER}/docrunr"
          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PAT != '' && secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          IMAGE_REPO="${{ steps.tags.outputs.image_repo }}"
          VERSION="${{ steps.tags.outputs.version }}"
          docker buildx imagetools create \
            -t "${IMAGE_REPO}:${VERSION}" \
            -t "${IMAGE_REPO}:latest" \
            "${IMAGE_REPO}:${VERSION}-amd64" \
            "${IMAGE_REPO}:${VERSION}-arm64"
