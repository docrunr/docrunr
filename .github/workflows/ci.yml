name: ci

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:
    branches:
      - main
      - "release/**"
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: UV_CACHE_DIR=.uv-cache uv run ruff check .

      - name: Type check core
        run: UV_CACHE_DIR=.uv-cache uv run mypy core/src/docrunr

      - name: Type check worker
        run: UV_CACHE_DIR=.uv-cache uv run mypy worker/src/docrunr_worker

      - name: Tests
        run: UV_CACHE_DIR=.uv-cache uv run pytest -q

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: UI install
        run: pnpm -C ui install --frozen-lockfile

      - name: UI lint
        run: pnpm -C ui run lint

      - name: UI typecheck
        run: pnpm -C ui run typecheck

      - name: UI tests
        run: pnpm -C ui run test
