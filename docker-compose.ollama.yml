# Ollama in Docker — use when Ollama is NOT installed on the host.
# Layer on top of the LLM overlay:
#   docker compose -f docker-compose.base.yml -f docker-compose.local.yml \
#     -f docker-compose.llm.yml -f docker-compose.ollama.yml up
#
# After first start, pull the embedding model:
#   docker compose -f docker-compose.base.yml -f docker-compose.local.yml \
#     -f docker-compose.llm.yml -f docker-compose.ollama.yml \
#     exec ollama ollama pull nomic-embed-text

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    volumes:
      - ./.data/ollama:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"

  litellm:
    environment:
      OLLAMA_API_BASE: http://ollama:11434
    depends_on:
      - ollama
