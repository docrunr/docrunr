# Ollama in Docker — use when Ollama is NOT installed on the host.
# Layer on top of the LLM overlay:
#   docker compose -f docker-compose.base.yml -f docker-compose.llm.yml -f docker-compose.ollama.yml up
#
# Entrypoint script pulls model(s) before `ollama serve` is PID 1 (Ollama's HTTP API does not
# auto-pull). Use OLLAMA_EMBED_MODELS (comma-separated). Names must match litellm.yaml.

services:
  ollama:
    image: ${OLLAMA_IMAGE:-ollama/ollama:latest}
    restart: unless-stopped
    environment:
      OLLAMA_EMBED_MODELS: ${OLLAMA_EMBED_MODELS:-nomic-embed-text,embeddinggemma,bge-m3,qwen3-embedding:8b}
    volumes:
      - ./.data/ollama:/root/.ollama
      - ./scripts/ollama-docker-entrypoint.sh:/docrunr-ollama-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/docrunr-ollama-entrypoint.sh"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 300s

  litellm:
    environment:
      OLLAMA_API_BASE: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
